version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/backend/data
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=sqlite:///./data/outlook_accounts.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
